[pytest]
# pytest 配置文件

# 测试文件搜索路径
testpaths = tests

# 测试文件命名模式
python_files = test_*.py

# 测试类命名模式
python_classes = Test*

# 测试函数命名模式
python_functions = test_*

# 默认命令行参数
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 异步测试配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 标记定义
markers =
    slow: 需要较长时间的测试（如真实 API 调用）
    integration: 集成测试
    unit: 单元测试
    smoke: 冒烟测试（快速验证基本功能）

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（如果安装了 pytest-cov）
# addopts = --cov=app --cov-report=html --cov-report=term
